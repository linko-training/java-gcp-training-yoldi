steps:
  - name: 'maven:3.9-eclipse-temurin-17'
    entrypoint: mvn
    args: ['clean', 'install', '-DskipTests']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--service-account=${_RUNTIME_SA}@$PROJECT_ID.iam.gserviceaccount.com'
      - '--set-env-vars=GCS_BUCKET=${_BUCKET},GCS_PREFIX=${_BUCKET_PREFIX}'

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: 'us-central1'
  _ARTIFACT_REPO: 'linko-java-repo'
  _RUNTIME_SA: 'reto1-runtime'
  _BUCKET: 'linko-challenge-files'
  _SERVICE_NAME: 'linko-java-api-jr'
  _BUCKET_PREFIX: 'jr-uploads/'
